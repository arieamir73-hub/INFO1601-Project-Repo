<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/loginCss.css" />
    <title>GamecatalougeApp - Login</title>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <h1>SKAL</h1>
          <p>Your Gaming Catalog For F2P Games</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="loginForm" onsubmit="return false;">
          <div class="input-group">
            <label>Email or Username</label>
            <input
              type="text"
              id="username"
              placeholder="bob@mail.com or bob"
              autocomplete="off"
            />
          </div>

          <div class="input-group">
            <label>Password</label>
            <div style="position: relative; display: flex; align-items: center">
              <input
                type="password"
                id="password"
                placeholder="Enter your password"
                style="padding-right: 40px; flex: 1"
              />
              <i
                class="bx bx-hide"
                id="togglePassword"
                style="
                  position: absolute;
                  right: 14px;
                  cursor: pointer;
                  font-size: 20px;
                  color: gray;
                "
              ></i>
            </div>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">Log In</button>
        </form>

        <div class="continue-btn-container">
          <button
            type="button"
            class="btn-continue"
            id="continueWithoutLoginBtn"
            onclick="window.location.href = 'index.html'"
          >
            Continue without login
          </button>
        </div>

        <div class="signup-link">
          Don't have an account?
          <a id="showSignup" href="signUp.html">Sign Up</a>
        </div>

        <div class="demo-hint-centered">
          Demo credentials:
          <div class="demo-credentials-line">
            <span>bob@mail.com</span> / <span>bobpass</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
