<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skal Reviews — My Profile</title>
    <!-- Boxicons & Google Fonts -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/indexCss.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <nav class="navBar">
      <i class="bx bx-menu" id="menuToggle"></i>
      <div class="navLinks">
        <a href="index.html" class="Logo">Skal Reviews</a>
        <a href="BrowseGames.html">Browse Games</a>
        <a href="profile.html">Profile</a>
        <a href="#faqQuestions">FAQ</a>
      </div>
      <input
        type="search"
        name="searchBar"
        id="searchBar"
        placeholder="Search Games"
      />
      <div id="searchDropdown" class="search-dropdown"></div>
      <button id="loginBtn"><a href="#">Login</a></button>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>Menu</span>
        <i class="bx bx-x" id="closeSidebar"></i>
      </div>
      <div class="sidebar-links">
        <a href="index.html">Home</a>
        <a href="BrowseGames.html">Browse Games</a>
        <a href="profile.html">Profile</a>
        <a href="#faqQuestions">FAQ</a>
      </div>
    </div>

    <main class="mainSection">
      <!-- PROFILE CARD: Square photo from API + bio below -->
      <div class="profileContainer">
        <div class="profilePhotoArea">
          <div class="squareProfilePic" id="profileAvatarBox">
            <div
              id="avatarPlaceholderIcon"
              style="font-size: 70px; color: rgb(109, 23, 153)"
            >
              <i class="bx bx-user-circle"></i>
            </div>
          </div>
        </div>
        <div class="profileBio" id="profileBioText">
          ✨ Loading gamer profile...
        </div>
      </div>

      <!-- Favourites / liked games section -->
      <div>
        <div class="favouritesHeading">
          <i class="bx bxs-heart" style="color: #ff4d6d"></i>
          <span>🎮 Liked & Favourited Games</span>
        </div>
        <div id="favouritesGrid" class="gamesGrid">
          <div class="loadingSpinner">
            <i class="bx bx-loader-alt bx-spin"></i> Loading your favourite
            games...
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="aboutSkal">
        <p class="aboutSkalHeader">SKAL REVIEW</p>
        <div class="followUsIcons">
          <p>Follow Us At:</p>
          <i class="bx bxl-instagram" style="color: #e4405f"></i>
          <i class="bx bxl-facebook" style="color: #1877f2"></i>
          <i class="bx bxl-youtube" style="color: #ff0000"></i>
          <i class="bx bxl-twitter" style="color: #1da1f2"></i>
        </div>
        <p>© SKAL REVIEWS 2026 Inc.</p>
      </div>
    </footer>

    <script src="js/index.js"></script>
    <script src="js/GameAPI.js"></script>
    <script src="js/search.js"></script>
    <script type="module" src="js/gamePage.js"></script>
    <script type="module" src="js/navbar.js"></script>
    <script type="module" src="js/profile.js"></script>
  </body>
</html>
