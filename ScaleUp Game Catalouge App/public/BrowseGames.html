<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/indexCss.css" />
    <link rel="stylesheet" href="css/browseGames.css" />
    <title>Skal Reviews</title>
  </head>
  <body>
    <nav class="navBar">
      <i class="bx bx-menu" id="menuToggle"></i>

      <div class="navLinks">
        <a href="index.html" class="Logo">Skal Reviews</a>
        <a href="BrowseGames.html">Browse Games</a>
        <a href="profile.html">Profile</a>
        <a href="#faqQuestions">FAQ</a>
      </div>

      <input
        type="search"
        name="searchBar"
        id="searchBar"
        placeholder="Search Games"
      />
      <div id="searchDropdown" class="search-dropdown"></div>

      <button id="loginBtn"><a href="login.html">Login</a></button>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>Menu</span>
        <i class="bx bx-x" id="closeSidebar"></i>
      </div>
      <div class="sidebar-links">
        <a href="index.html" class="Logo">Home</a>
        <a href="BrowseGames.html">Browse Games</a>
        <a href="profile.html">Profile</a>
        <a href="#faqQuestions">FAQ</a>
      </div>
    </div>

    <section class="hero">
      <p class="heroLogo">Broswe All Games</p>
    </section>

    <main class="mainSection">
      <div class="filterSection">
        <div class="filtersName">
          <p>Platform</p>
          <p>Timeframe</p>
          <p>Genre</p>
          <p>Reset</p>
        </div>
        <div class="filterOptions">
          <select name="platform" id="platformSection"></select>
          <select name="timeframe" id="timeframeSection"></select>
          <select name="genre" id="genreSection"></select>
          <button id="resetFilters" class="reset-btn">Reset Filters</button>
        </div>
      </div>

      <div class="gameListContainer">
        <div class="gameListHeader">
          <span>No.</span>
          <span>Game</span>
          <span>Platform</span>
          <span>Genre</span>
          <span>Release Date</span>
        </div>

        <div id="gameListContent" class="gameListContent">
          <!-- Games will be inserted here -->
        </div>

        <div class="pagination" id="pagination">
          <!-- Pagination buttons will go here -->
        </div>
      </div>
    </main>

    <footer>
      <div class="aboutSkal">
        <p class="aboutSkalHeader">SKAL REVIEW</p>
        <div class="followUsIcons">
          <p>Follow Us At:</p>
          <i class="bx bxl-instagram" style="color: #e4405f"></i>
          <i class="bx bxl-facebook" style="color: #1877f2"></i>
          <i class="bx bxl-youtube" style="color: #ff0000"></i>
          <i class="bx bxl-twitter" style="color: #1da1f2"></i>
        </div>
        <p>© SKAL REVIEWS 2026 Inc.</p>
      </div>
    </footer>
    <script src="js/index.js"></script>
    <script src="js/search.js"></script>
    <script src="js/browse.js"></script>
    <script type="module" src="js/navbar.js"></script>
  </body>
</html>
